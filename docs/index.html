<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prozy - Browse the Web</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --text: #e0e0e8;
      --muted: #8888a0;
      --accent: #6c5ce7;
      --accent-glow: rgba(108, 92, 231, 0.3);
      --green: #00e676;
      --orange: #ffab40;
      --red: #ff5252;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .bg-grid {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-image:
        linear-gradient(rgba(108, 92, 231, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(108, 92, 231, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
      pointer-events: none;
    }

    /* --- Landing view (centered like Google) --- */
    .landing {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      padding: 20px;
      transition: all 0.3s;
    }

    .landing.minimized {
      flex: 0;
      padding: 0;
    }

    .logo-big {
      font-size: 4.5rem;
      font-weight: 800;
      letter-spacing: 4px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #fff 0%, #6c5ce7 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      transition: all 0.3s;
    }

    .landing.minimized .logo-big {
      font-size: 1.4rem;
      margin-bottom: 0;
    }

    .tagline {
      font-size: 1.1rem;
      color: var(--muted);
      margin-bottom: 40px;
      transition: all 0.3s;
    }

    .landing.minimized .tagline { display: none; }

    /* --- Search bar --- */
    .search-wrap {
      width: 100%;
      max-width: 640px;
      transition: all 0.3s;
    }

    .landing.minimized .search-wrap {
      max-width: 100%;
    }

    .search-bar {
      display: flex;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 28px;
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-bar:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 30px var(--accent-glow);
    }

    .search-bar input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 16px 24px;
      font-size: 1.05rem;
      color: var(--text);
      outline: none;
      font-family: inherit;
    }

    .search-bar input::placeholder { color: #555568; }

    .search-bar button {
      background: var(--accent);
      border: none;
      padding: 16px 28px;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .search-bar button:hover { background: #7c6cf7; }

    .search-bar button svg {
      width: 20px; height: 20px;
      fill: #fff;
    }

    .search-bar button.loading svg { animation: spin 1s linear infinite; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Top bar (when browsing) */
    .top-bar {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 2;
    }

    .top-bar.visible { display: flex; }

    .top-bar .logo-sm {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--accent);
      cursor: pointer;
      flex-shrink: 0;
    }

    .top-bar .search-bar {
      flex: 1;
      border-radius: 10px;
    }

    .top-bar .search-bar input { padding: 10px 16px; font-size: 0.9rem; }
    .top-bar .search-bar button { padding: 10px 20px; }
    .top-bar .search-bar button svg { width: 16px; height: 16px; }

    .cache-pill {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 6px;
      letter-spacing: 0.5px;
      flex-shrink: 0;
      display: none;
    }
    .cache-pill.hit {
      display: block;
      background: rgba(0, 230, 118, 0.12);
      color: var(--green);
      border: 1px solid rgba(0, 230, 118, 0.2);
    }
    .cache-pill.miss {
      display: block;
      background: rgba(255, 171, 64, 0.12);
      color: var(--orange);
      border: 1px solid rgba(255, 171, 64, 0.2);
    }

    .time-pill {
      font-size: 0.75rem;
      color: var(--muted);
      flex-shrink: 0;
      display: none;
    }
    .time-pill.visible { display: block; }

    /* Quick links */
    .quick-links {
      display: flex;
      gap: 10px;
      margin-top: 28px;
      flex-wrap: wrap;
      justify-content: center;
      transition: all 0.3s;
    }

    .landing.minimized .quick-links { display: none; }

    .quick-link {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 8px 18px;
      font-size: 0.85rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .quick-link:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    /* Content viewer */
    .viewer {
      flex: 1;
      display: none;
      position: relative;
      z-index: 1;
    }

    .viewer.visible { display: flex; flex-direction: column; }

    .viewer iframe {
      flex: 1;
      width: 100%;
      border: none;
      background: #fff;
    }

    .viewer .error-msg {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      padding: 40px;
      text-align: center;
    }

    .viewer .error-msg .error-icon { font-size: 3rem; }
    .viewer .error-msg .error-text { color: var(--red); font-size: 1.1rem; }
    .viewer .error-msg .error-detail { color: var(--muted); font-size: 0.9rem; max-width: 400px; }

    .viewer .error-msg .try-again {
      padding: 10px 24px;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      border: none;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 20px;
      color: #444;
      font-size: 0.8rem;
      position: relative;
      z-index: 1;
    }

    .footer a { color: var(--accent); text-decoration: none; }

    .landing.minimized ~ .footer { display: none; }

    /* Settings gear */
    .settings-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 40px; height: 40px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      font-size: 1.2rem;
      transition: all 0.2s;
    }
    .settings-btn:hover { border-color: var(--accent); transform: rotate(90deg); }

    .settings-panel {
      position: fixed;
      bottom: 70px;
      right: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      z-index: 10;
      display: none;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      width: 300px;
    }
    .settings-panel.visible { display: block; }

    .settings-panel label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .settings-panel input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 0.85rem;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      outline: none;
      margin-bottom: 12px;
    }
    .settings-panel input:focus { border-color: var(--accent); }

    .settings-panel .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
    }

    .settings-panel .dot {
      width: 8px; height: 8px; border-radius: 50%;
    }
    .dot.online { background: var(--green); }
    .dot.offline { background: var(--red); }
    .dot.checking { background: var(--orange); animation: pulse 1s infinite; }

    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

    @media (max-width: 600px) {
      .logo-big { font-size: 3rem; }
      .search-bar input { padding: 14px 16px; font-size: 0.95rem; }
      .quick-links { gap: 6px; }
      .quick-link { padding: 6px 14px; font-size: 0.8rem; }
      .top-bar { padding: 10px 12px; gap: 8px; }
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>

  <!-- Top bar (shown when browsing) -->
  <div class="top-bar" id="topBar">
    <div class="logo-sm" onclick="goHome()">PROZY</div>
    <div class="search-bar">
      <input type="text" id="topInput" placeholder="Enter a URL..." spellcheck="false" autocomplete="off">
      <button onclick="browse(document.getElementById('topInput').value)" id="topGoBtn">
        <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>
    <div class="cache-pill" id="cachePill"></div>
    <div class="time-pill" id="timePill"></div>
  </div>

  <!-- Landing (Google-style centered) -->
  <div class="landing" id="landing">
    <div class="logo-big">PROZY</div>
    <div class="tagline">Browse any website</div>
    <div class="search-wrap">
      <div class="search-bar">
        <input type="text" id="mainInput" placeholder="Enter a URL and hit Go..." spellcheck="false" autocomplete="off" autofocus>
        <button onclick="browse(document.getElementById('mainInput').value)" id="mainGoBtn">
          <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>
    </div>
    <div class="quick-links" id="quickLinks"></div>
  </div>

  <!-- Content viewer -->
  <div class="viewer" id="viewer"></div>

  <!-- Footer -->
  <div class="footer">
    <a href="https://github.com/codedrop121/prozy" target="_blank">GitHub</a>
  </div>

  <!-- Settings -->
  <div class="settings-btn" onclick="toggleSettings()">&#x2699;</div>
  <div class="settings-panel" id="settingsPanel">
    <label>Proxy Server URL</label>
    <input type="text" id="serverInput" value="http://localhost:8080" placeholder="http://localhost:8080" oninput="checkServerDebounced()">
    <div class="status" id="serverStatusText">
      <div class="dot" id="serverDot"></div>
      <span id="serverLabel">Click to check</span>
    </div>
  </div>

  <script>
    const STORAGE_SERVER = "prozy_server";
    const STORAGE_RECENT = "prozy_recent";

    // Load saved server
    const savedServer = localStorage.getItem(STORAGE_SERVER);
    if (savedServer) document.getElementById("serverInput").value = savedServer;

    // Recent URLs
    function getRecent() {
      try { return JSON.parse(localStorage.getItem(STORAGE_RECENT)) || []; } catch { return []; }
    }
    function addRecent(url) {
      let r = getRecent().filter(u => u !== url);
      r.unshift(url);
      if (r.length > 6) r = r.slice(0, 6);
      localStorage.setItem(STORAGE_RECENT, JSON.stringify(r));
      renderQuickLinks();
    }
    function renderQuickLinks() {
      const links = getRecent();
      const el = document.getElementById("quickLinks");
      if (!links.length) {
        el.innerHTML = ["wikipedia.org", "example.com", "httpbin.org"].map(u =>
          '<div class="quick-link" onclick="browse(\'' + u + '\')">' + u + '</div>'
        ).join("");
        return;
      }
      el.innerHTML = links.map(u => {
        const short = u.replace(/^https?:\/\//, "").replace(/\/$/, "").slice(0, 28);
        return '<div class="quick-link" onclick="browse(\'' + u.replace(/'/g, "\\'") + '\')">' + short + '</div>';
      }).join("");
    }
    renderQuickLinks();

    // Enter key on both inputs
    document.getElementById("mainInput").addEventListener("keydown", e => { if (e.key === "Enter") browse(e.target.value); });
    document.getElementById("topInput").addEventListener("keydown", e => { if (e.key === "Enter") browse(e.target.value); });

    // Main browse function
    async function browse(url) {
      if (!url || !url.trim()) return;
      url = url.trim();
      if (!/^https?:\/\//i.test(url)) url = "https://" + url;

      const server = document.getElementById("serverInput").value.trim().replace(/\/+$/, "");
      localStorage.setItem(STORAGE_SERVER, server);

      // Switch to browsing view
      document.getElementById("landing").style.display = "none";
      document.getElementById("topBar").classList.add("visible");
      document.getElementById("topInput").value = url;

      const viewer = document.getElementById("viewer");
      viewer.classList.add("visible");
      viewer.innerHTML = '<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);">Loading...</div>';

      const cachePill = document.getElementById("cachePill");
      const timePill = document.getElementById("timePill");
      cachePill.className = "cache-pill";
      cachePill.textContent = "";
      timePill.className = "time-pill";

      const startTime = performance.now();

      try {
        const res = await fetch(server + "/" + url);
        const elapsed = Math.round(performance.now() - startTime);
        const cacheHeader = res.headers.get("X-Prozy-Cache");
        const contentType = res.headers.get("Content-Type") || "";

        // Cache badge
        if (cacheHeader === "HIT") {
          cachePill.className = "cache-pill hit";
          cachePill.textContent = "CACHED";
        } else if (cacheHeader === "MISS") {
          cachePill.className = "cache-pill miss";
          cachePill.textContent = "FRESH";
        }

        // Time
        timePill.className = "time-pill visible";
        timePill.textContent = elapsed + "ms";

        // Show content
        if (contentType.includes("text/html")) {
          const html = await res.text();
          viewer.innerHTML = "";
          const iframe = document.createElement("iframe");
          iframe.sandbox = "allow-same-origin";
          viewer.appendChild(iframe);
          iframe.contentDocument.open();
          iframe.contentDocument.write(html);
          iframe.contentDocument.close();
        } else {
          const text = await res.text();
          viewer.innerHTML = '<pre style="flex:1;padding:24px;overflow:auto;color:var(--muted);font-family:monospace;font-size:0.85rem;margin:0;">' +
            text.replace(/</g, "&lt;").slice(0, 10000) + '</pre>';
        }

        addRecent(url);

      } catch (err) {
        viewer.innerHTML =
          '<div class="error-msg">' +
            '<div class="error-icon">&#x26A0;</div>' +
            '<div class="error-text">Could not load page</div>' +
            '<div class="error-detail">' + err.message + '. Make sure your Prozy server is running.</div>' +
            '<button class="try-again" onclick="browse(\'' + url.replace(/'/g, "\\'") + '\')">Try Again</button>' +
          '</div>';
      }
    }

    // Go back to home
    function goHome() {
      document.getElementById("landing").style.display = "";
      document.getElementById("topBar").classList.remove("visible");
      document.getElementById("viewer").classList.remove("visible");
      document.getElementById("viewer").innerHTML = "";
      document.getElementById("mainInput").value = "";
      document.getElementById("mainInput").focus();
      document.getElementById("cachePill").className = "cache-pill";
      document.getElementById("timePill").className = "time-pill";
    }

    // Settings
    function toggleSettings() {
      const p = document.getElementById("settingsPanel");
      p.classList.toggle("visible");
      if (p.classList.contains("visible")) checkServer();
    }

    let checkTimeout;
    function checkServerDebounced() {
      clearTimeout(checkTimeout);
      checkTimeout = setTimeout(checkServer, 500);
    }

    async function checkServer() {
      const url = document.getElementById("serverInput").value.trim().replace(/\/+$/, "");
      localStorage.setItem(STORAGE_SERVER, url);
      const dot = document.getElementById("serverDot");
      const label = document.getElementById("serverLabel");
      dot.className = "dot checking";
      label.textContent = "Checking...";
      try {
        const res = await fetch(url + "/health", { mode: "cors" });
        const data = await res.json();
        if (data.status === "ok") {
          dot.className = "dot online";
          label.textContent = "Online - " + data.cached + " cached";
        } else {
          dot.className = "dot offline";
          label.textContent = "Unexpected response";
        }
      } catch {
        dot.className = "dot offline";
        label.textContent = "Offline - start your server";
      }
    }
  </script>
</body>
</html>
